spring:
  application:
    name: kimbap-admin

  # ── PostgreSQL ────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kimbapdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:kimbap_user}
    password: ${DB_PASSWORD:pw1234}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create}   # Render 배포 후 none 또는 validate 로 변경
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always           # data.sql 항상 실행

server:
  port: ${PORT:8080}

logging:
  level:
    com.nirvana.kimbap: DEBUG
    org.springframework.web: INFO
